spring.application.name=LearningProcessor

server.address=0.0.0.0
server.port=8028

server.servlet.context-path=/api/learning-processor

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.datasource.url=jdbc:oracle:thin:@bddb02.therapbd.net:1521/trainee_pdb.bddb02.therapbd.net
spring.datasource.username=trainee9
spring.datasource.password=trainee9
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000

spring.servlet.multipart.enabled=true

spring.kafka.bootstrap-servers=broker-1:9092,broker-2:9094,broker-3:9096
spring.kafka.client-id=learning-processor
kafka.topics.notification=notification-topic
kafka.topics.notification.partition=10
kafka.topics.notification.replication=3
kafka.topics.update-info=update-info-topic
kafka.topics.update-info.grp=update-info-grp
kafka.topics.registration=student-registration-topic
kafka.topics.registration.grp=student-registration-grp
kafka.topics.deletion=student-deletion-topic
kafka.topics.deletion.grp=student-deletion-grp

springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.urls.primary-name=default
server.forward-headers-strategy=framework
springdoc.swagger-ui.display-request-duration=true

logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.net.therap.learningProcessor.config.FeignConfig=DEBUG
logging.level.org.apache.http=DEBUG