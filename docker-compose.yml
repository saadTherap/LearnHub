services:
  auth-key-provider:
    build:
      context: ./authkeyprovider
      dockerfile: Dockerfile
    container_name: authkeyprovider
    ports:
      - "8091:8091"
    restart: unless-stopped

  auth-server:
    build:
      context: ./authserver
      dockerfile: Dockerfile
    container_name: authserver
    ports:
      - "8090:8090"
    restart: unless-stopped

  secure-file-server:
    build:
      context: ./secureFileServer
      dockerfile: Dockerfile
    container_name: secureFileServer
    ports:
      - "8026:8026"
    depends_on:
      - clamav
    environment:
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    volumes:
      - /home/app-rnd01/storage/FileStorage:/home/app-rnd01/secureFileStorage/uploads
    networks:
      - app-network

  clamav:
    image: mkodockx/docker-clamav:alpine
    container_name: clamav
    ports:
      - "3310:3310"
    restart: unless-stopped
    networks:
      - app-network

  course-configurator:
    build:
      context: ./courseConfigurator
      dockerfile: Dockerfile
    container_name: courseConfigurator
    ports:
      - "8082:8082"
    restart: unless-stopped

  learning-processor:
    build:
      context: ./learningProcessor
      dockerfile: Dockerfile
    container_name: learningProcessor
    ports:
      - "8028:8028"
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "9090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: kafka-cluster
      KAFKA_CLUSTERS_0_DESCRIPTION: "Local Kafka cluster in KRaft mode for LearnHub"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:9092,broker-2:9094,broker-3:9096
      SERVER_SERVLET_CONTEXT_PATH: /kafka-ui

    extra_hosts:
      - "broker-1:host-gateway"
      - "broker-2:host-gateway"
      - "broker-3:host-gateway"

  generate-cluster-id:
    image: ubuntu:latest
    container_name: generate-cluster-id
    user: root
    volumes:
      - ./kafka:/kafka
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "chmod +x kafka/generate-cluster-id.sh && kafka/generate-cluster-id.sh"
    restart: "no"

  broker-1:
    image: apache/kafka:latest
    container_name: broker-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker-1:29092,CONTROLLER://broker-1:9093,EXTERNAL://broker-1:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-1:29092,EXTERNAL://broker-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - ./kafka:/kapp-networkafka
      - broker1-data:/var/lib/kafka/data
    env_file:
      - ./kafka/cluster-id.env

  broker-2:
    image: apache/kafka:latest
    container_name: broker-2
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker-2:29092,CONTROLLER://broker-2:9093,EXTERNAL://broker-2:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-2:29092,EXTERNAL://broker-2:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - ./kafka:/kafka
      - broker2-data:/var/lib/kafka/data
    env_file:
      - ./kafka/cluster-id.env

  broker-3:
    image: apache/kafka:latest
    container_name: broker-3
    ports:
      - "9096:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker-3:29092,CONTROLLER://broker-3:9093,EXTERNAL://broker-3:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker-3:29092,EXTERNAL://broker-3:9096
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - ./kafka:/kafka
      - broker3-data:/var/lib/kafka/data
    env_file:
      - ./kafka/cluster-id.env

volumes:
  broker1-data:
  broker2-data:
  broker3-data:


networks:
  app-network:
    driver: bridge
