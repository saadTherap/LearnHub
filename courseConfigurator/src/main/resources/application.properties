spring.application.name=app

# --------- server -------
server.port=8082

# -------- Spring Doc ----------
springdoc.swagger-ui.path=/api-ui.html
springdoc.api-docs.path=/api-docs


# --- Database Configuration (for Oracle) ---
spring.datasource.url=jdbc:oracle:thin:@bddb02.therapbd.net:1521/trainee_pdb.bddb02.therapbd.net
spring.datasource.username=trainee9
spring.datasource.password=trainee9
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- JPA/Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=none

# Show SQL queries in console (useful for development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# context path
server.servlet.context-path=/myApp

# Oracle dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

management.endpoints.web.exposure.include=health,info

info.app.name=Spring Boot App
info.app.description=kisher description?

custom.property.1=hello

# Spring Security In-Memory User Configuration
spring.security.user.name=user
spring.security.user.password={noop}password
spring.security.user.roles=ADMIN,INSTRUCTOR,STUDENT