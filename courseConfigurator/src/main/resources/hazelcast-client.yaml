hazelcast-client:
  cluster-name: learnhub
  network:
    cluster-members:
      - 172.16.2.115:5701
      - 172.16.2.115:5702
      - 172.16.2.115:5703
    smart-routing: true
    redo-operation: true
  connection-strategy:
    async-start: true
    reconnect-mode: ASYNCHRONOUS
    connection-timeout: 10000

  near-cache:
    courses:
      in-memory-format: OBJECT
      time-to-live-seconds: 1800
      invalidate-on-change: true
      eviction:
        eviction-policy: LRU
        max-size-policy: ENTRY_COUNT
        size: 1000
