apiVersion: 1
datasources:
  - name: k6influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    database: k6
    user: ""
    password: ""
    jsonData:
      timeInterval: "5s"

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
